<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotional Knowledge — Martha Nussbaum | Stage 2 Philosophy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ─────────────────────────────────────── */
:root {
  --navy:          #1B2A4A;
  --navy-light:    #2D4070;
  --navy-hover:    #162238;
  --amber:         #C68B2A;
  --amber-light:   #E5A93A;
  --amber-bg:      #FEF8EC;
  --amber-border:  #E8C97B;
  --cream:         #F8F4ED;
  --cream-dark:    #EDE8DF;
  --charcoal:      #1E1E1E;
  --body-text:     #2C2C2C;
  --mid-grey:      #6B6B6B;
  --light-grey:    #D4D0C8;
  --divider:       #E2DDD5;
  --success:       #2D6A4F;
  --success-bg:    #D8F3DC;
  --error:         #9B2226;
  --error-bg:      #FFE8E8;

  --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
  --font-sans:  'Inter', system-ui, -apple-system, sans-serif;

  --text-sm:   14px;
  --text-base: 18px;
  --text-lg:   22px;
  --text-xl:   28px;
  --text-2xl:  38px;
  --text-3xl:  52px;

  --space-xs:  8px;
  --space-sm:  16px;
  --space-md:  24px;
  --space-lg:  32px;
  --space-xl:  48px;
  --space-2xl: 64px;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --shadow-sm: 0 1px 3px rgba(27,42,74,0.08);
  --shadow-md: 0 4px 16px rgba(27,42,74,0.12);
  --transition: 0.2s ease;
}

/* ── Reset ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  color: var(--body-text);
  background: var(--cream);
  min-height: 100vh;
  line-height: 1.65;
}
img { display: block; width: 100%; height: auto; }
button { cursor: pointer; font-family: var(--font-sans); }
textarea, input { font-family: var(--font-sans); }
a { color: var(--navy); }
a:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }

/* ── Skip link ─────────────────────────────────────────── */
.skip-link {
  position: absolute;
  top: -100px;
  left: var(--space-sm);
  background: var(--navy);
  color: #fff;
  padding: var(--space-xs) var(--space-sm);
  border-radius: var(--radius-sm);
  font-size: var(--text-sm);
  font-weight: 600;
  z-index: 1000;
  text-decoration: none;
}
.skip-link:focus { top: var(--space-sm); }

/* ── SR only ────────────────────────────────────────────── */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

/* ── Site header ───────────────────────────────────────── */
.site-header {
  background: var(--navy);
  color: #fff;
  padding: var(--space-sm) var(--space-xl);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-md);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-md);
}
.site-header h1 {
  font-family: var(--font-serif);
  font-size: var(--text-xl);
  font-weight: 600;
  letter-spacing: -0.01em;
  color: #fff;
}
.site-header h1 em { color: var(--amber-light); font-style: italic; }
.unit-label {
  font-size: var(--text-sm);
  opacity: 0.65;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.progress-dots {
  display: flex;
  gap: var(--space-xs);
  align-items: center;
}
.progress-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  border: 2px solid transparent;
  transition: var(--transition);
}
.progress-dot.active {
  background: var(--amber-light);
  border-color: var(--amber-light);
}
.progress-dot.completed {
  background: rgba(255,255,255,0.7);
  border-color: rgba(255,255,255,0.7);
}

/* ── Layout ─────────────────────────────────────────────── */
.layout {
  display: flex;
  align-items: flex-start;
  max-width: 1600px;
  margin: 0 auto;
}

/* ── Main content panel ─────────────────────────────────── */
.main-content {
  flex: 1;
  min-width: 0;
  padding: var(--space-xl) var(--space-2xl) var(--space-xl) var(--space-xl);
  border-right: 1px solid var(--divider);
  min-height: calc(100vh - 64px);
}

/* ── Level hero ─────────────────────────────────────────── */
.level-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  color: var(--navy);
  font-size: var(--text-sm);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px var(--space-sm);
  border-radius: 40px;
  margin-bottom: var(--space-md);
}
.level-title {
  font-family: var(--font-serif);
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--navy);
  line-height: 1.2;
  margin-bottom: var(--space-xs);
}
.level-subtitle {
  font-size: var(--text-lg);
  color: var(--mid-grey);
  font-style: italic;
  font-family: var(--font-serif);
  margin-bottom: var(--space-lg);
}
.level-image {
  width: 100%;
  max-height: 280px;
  object-fit: cover;
  border-radius: var(--radius-lg);
  margin-bottom: var(--space-xl);
  box-shadow: var(--shadow-md);
}

/* ── Content prose ───────────────────────────────────────── */
.content-body { max-width: 680px; }
.content-body h2 {
  font-family: var(--font-serif);
  font-size: var(--text-xl);
  color: var(--navy);
  margin: var(--space-xl) 0 var(--space-sm);
  border-left: 4px solid var(--amber);
  padding-left: var(--space-sm);
}
.content-body h3 {
  font-family: var(--font-serif);
  font-size: var(--text-lg);
  color: var(--navy);
  margin: var(--space-lg) 0 var(--space-xs);
}
.content-body p { margin-bottom: var(--space-sm); }
.content-body ul, .content-body ol {
  margin: var(--space-sm) 0 var(--space-sm) var(--space-lg);
}
.content-body li { margin-bottom: var(--space-xs); }

.key-term {
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  border-radius: var(--radius-sm);
  padding: 1px 6px;
  font-weight: 500;
  color: var(--navy);
}
.quotation {
  border-left: 4px solid var(--amber);
  margin: var(--space-md) 0;
  padding: var(--space-sm) var(--space-md);
  background: var(--amber-bg);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-style: italic;
  font-family: var(--font-serif);
  font-size: var(--text-lg);
  color: var(--navy);
}
.quotation cite {
  display: block;
  margin-top: var(--space-xs);
  font-style: normal;
  font-size: var(--text-sm);
  color: var(--mid-grey);
  font-family: var(--font-sans);
}
.objection-box {
  background: #EEF2FF;
  border: 1px solid #C7D2FE;
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin: var(--space-md) 0;
}
.objection-box strong { color: var(--navy); }
.callout {
  background: var(--cream-dark);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin: var(--space-md) 0;
  border: 1px solid var(--divider);
}
.callout .callout-label {
  font-size: var(--text-sm);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--mid-grey);
  margin-bottom: var(--space-xs);
}

/* ── Activity zone ───────────────────────────────────────── */
.activity-zone {
  margin-top: var(--space-2xl);
  background: #fff;
  border: 1px solid var(--divider);
  border-radius: var(--radius-lg);
  padding: var(--space-xl);
  box-shadow: var(--shadow-sm);
}
.activity-header {
  display: flex;
  align-items: flex-start;
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}
.activity-icon {
  background: var(--navy);
  color: #fff;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-lg);
  flex-shrink: 0;
}
.activity-header h2 {
  font-family: var(--font-serif);
  font-size: var(--text-xl);
  color: var(--navy);
  margin: 0 0 4px;
  border: none;
  padding: 0;
}
.activity-header p { color: var(--mid-grey); font-size: var(--text-base); }

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  padding: 12px var(--space-md);
  border-radius: var(--radius-md);
  font-size: var(--text-base);
  font-weight: 600;
  border: 2px solid transparent;
  transition: var(--transition);
  text-decoration: none;
  line-height: 1;
  min-height: 44px;
}
.btn:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }
.btn-primary {
  background: var(--navy);
  color: #fff;
}
.btn-primary:hover { background: var(--navy-hover); }
.btn-primary:disabled { opacity: 0.45; cursor: default; }
.btn-amber {
  background: var(--amber);
  color: #fff;
}
.btn-amber:hover { background: var(--amber-light); }
.btn-outline {
  background: transparent;
  color: var(--navy);
  border-color: var(--navy);
}
.btn-outline:hover { background: var(--cream-dark); }
.btn-sm { padding: 8px var(--space-sm); font-size: var(--text-sm); min-height: 36px; }

/* ── Quote classifier (Level 1 activity) ─────────────────── */
.claim-card {
  background: var(--cream);
  border: 2px solid var(--divider);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin-bottom: var(--space-md);
}
.claim-card blockquote {
  font-family: var(--font-serif);
  font-size: var(--text-lg);
  color: var(--navy);
  font-style: italic;
  margin-bottom: var(--space-sm);
}
.claim-card cite { font-size: var(--text-sm); color: var(--mid-grey); display: block; }
.claim-options {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-xs);
  margin-top: var(--space-sm);
}
.claim-option-btn {
  padding: 8px var(--space-sm);
  border-radius: 40px;
  border: 2px solid var(--light-grey);
  background: #fff;
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--body-text);
  transition: var(--transition);
  min-height: 36px;
}
.claim-option-btn:hover { border-color: var(--navy); color: var(--navy); }
.claim-option-btn.selected-correct {
  background: var(--success-bg);
  border-color: var(--success);
  color: var(--success);
}
.claim-option-btn.selected-wrong {
  background: var(--error-bg);
  border-color: var(--error);
  color: var(--error);
}
.claim-option-btn:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }
.claim-feedback {
  margin-top: var(--space-sm);
  padding: var(--space-sm);
  border-radius: var(--radius-sm);
  font-size: var(--text-sm);
  display: none;
}
.claim-feedback.correct { background: var(--success-bg); color: var(--success); }
.claim-feedback.wrong { background: var(--error-bg); color: var(--error); }
.claim-feedback.show { display: block; }

/* ── Zone sort (Level 2 activity) ────────────────────────── */
.sort-pool {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
  min-height: 80px;
  padding: var(--space-sm);
  border: 2px dashed var(--light-grey);
  border-radius: var(--radius-md);
}
.sort-zones {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}
.sort-zone {
  min-height: 120px;
  border: 2px solid var(--light-grey);
  border-radius: var(--radius-md);
  padding: var(--space-sm);
  background: #fff;
  transition: var(--transition);
}
.sort-zone.zone-active { border-color: var(--amber); background: var(--amber-bg); }
.sort-zone-label {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--mid-grey);
  margin-bottom: var(--space-xs);
  text-align: center;
}
.sort-card {
  background: var(--navy);
  color: #fff;
  padding: 8px var(--space-sm);
  border-radius: var(--radius-sm);
  font-size: var(--text-sm);
  cursor: pointer;
  user-select: none;
  transition: var(--transition);
  margin-bottom: var(--space-xs);
  border: 2px solid transparent;
  min-height: 36px;
}
.sort-card:hover { background: var(--navy-light); }
.sort-card.card-selected {
  border-color: var(--amber-light);
  outline: 3px solid var(--amber);
}
.sort-card:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }
.sort-card.correct-placed { background: var(--success); }
.sort-card.wrong-placed { background: var(--error); }

/* ── Argument builder (Level 3 activity) ─────────────────── */
.arg-cards-container {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}
.arg-card {
  background: #fff;
  border: 2px solid var(--divider);
  border-radius: var(--radius-md);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
  transition: var(--transition);
  cursor: pointer;
}
.arg-card:hover { border-color: var(--navy); box-shadow: var(--shadow-sm); }
.arg-card.arg-selected { border-color: var(--amber); background: var(--amber-bg); }
.arg-card.arg-correct { border-color: var(--success); background: var(--success-bg); }
.arg-card.arg-wrong { border-color: var(--error); background: var(--error-bg); }
.arg-card:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }
.arg-number {
  width: 32px;
  height: 32px;
  background: var(--cream-dark);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: var(--text-sm);
  flex-shrink: 0;
  color: var(--navy);
}
.arg-number.active { background: var(--amber); color: #fff; }

/* ── Path scenario (Level 4 activity) ────────────────────── */
.path-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
  margin-bottom: var(--space-md);
}
.path-card {
  border: 2px solid var(--divider);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: var(--transition);
}
.path-card-header {
  padding: var(--space-sm) var(--space-md);
  font-weight: 600;
  font-size: var(--text-sm);
}
.path-a .path-card-header { background: #EEF2FF; color: #3730A3; }
.path-b .path-card-header { background: var(--amber-bg); color: var(--amber); }
.path-card-body { padding: var(--space-md); font-size: var(--text-sm); }
.path-question {
  margin-top: var(--space-md);
  background: var(--cream-dark);
  border-radius: var(--radius-md);
  padding: var(--space-md);
}
.path-question p { font-weight: 600; margin-bottom: var(--space-sm); }
.path-radio-group { display: flex; flex-direction: column; gap: var(--space-xs); }
.path-radio-label {
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
  cursor: pointer;
  padding: var(--space-xs) var(--space-sm);
  border-radius: var(--radius-sm);
  border: 2px solid transparent;
  transition: var(--transition);
  font-size: var(--text-sm);
}
.path-radio-label:hover { background: var(--cream-dark); }
.path-radio-label input[type="radio"] { margin-top: 2px; flex-shrink: 0; }
.path-radio-label.path-correct { background: var(--success-bg); border-color: var(--success); color: var(--success); }
.path-radio-label.path-wrong { background: var(--error-bg); border-color: var(--error); color: var(--error); }

/* ── Claim matcher (Level 5 activity) ────────────────────── */
.matcher-item {
  display: flex;
  align-items: flex-start;
  gap: var(--space-md);
  padding: var(--space-sm) 0;
  border-bottom: 1px solid var(--divider);
}
.matcher-item:last-child { border-bottom: none; }
.matcher-claim { flex: 1; font-size: var(--text-sm); }
.matcher-options {
  display: flex;
  gap: var(--space-xs);
  flex-shrink: 0;
}
.matcher-btn {
  padding: var(--space-xs) var(--space-sm);
  border-radius: 40px;
  border: 2px solid var(--light-grey);
  background: #fff;
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--mid-grey);
  transition: var(--transition);
  min-height: 36px;
}
.matcher-btn:hover { border-color: var(--navy); color: var(--navy); }
.matcher-btn.selected { background: var(--navy); color: #fff; border-color: var(--navy); }
.matcher-btn.correct-final { background: var(--success); color: #fff; border-color: var(--success); }
.matcher-btn.wrong-final { background: var(--error); color: #fff; border-color: var(--error); }
.matcher-btn:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }

/* ── Dialectical exchange (Level 6 activity) ─────────────── */
.plato-objection {
  background: #EEF2FF;
  border: 1px solid #C7D2FE;
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin-bottom: var(--space-lg);
}
.plato-objection .voice-label {
  font-size: var(--text-sm);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #4338CA;
  margin-bottom: var(--space-sm);
}
.reply-options {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
}
.reply-option {
  border: 2px solid var(--divider);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  cursor: pointer;
  transition: var(--transition);
  background: #fff;
  text-align: left;
  width: 100%;
  font-size: var(--text-sm);
}
.reply-option:hover { border-color: var(--navy); }
.reply-option.reply-selected { border-color: var(--amber); background: var(--amber-bg); }
.reply-option.reply-best { border-color: var(--success); background: var(--success-bg); }
.reply-option.reply-not-best { border-color: var(--error-bg); opacity: 0.7; }
.reply-option:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }
.reply-label { font-weight: 600; color: var(--navy); margin-bottom: var(--space-xs); }

.synthesis-area {
  background: var(--cream-dark);
  border-radius: var(--radius-md);
  padding: var(--space-md);
}
.synthesis-area h3 { font-family: var(--font-serif); color: var(--navy); margin-bottom: var(--space-sm); }
.synthesis-area p { font-size: var(--text-sm); color: var(--mid-grey); margin-bottom: var(--space-sm); }
.synthesis-textarea {
  width: 100%;
  min-height: 140px;
  padding: var(--space-sm);
  border: 2px solid var(--light-grey);
  border-radius: var(--radius-sm);
  font-size: var(--text-base);
  resize: vertical;
  background: #fff;
  color: var(--body-text);
  line-height: 1.65;
  transition: var(--transition);
}
.synthesis-textarea:focus { outline: none; border-color: var(--navy); }
.word-count { font-size: var(--text-sm); color: var(--mid-grey); margin-top: var(--space-xs); }
.word-count.target { color: var(--success); }

/* ── Activity score ───────────────────────────────────────── */
.activity-score {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-md);
  margin-top: var(--space-md);
  display: none;
}
.activity-score.show { display: flex; }
.activity-score.good { background: var(--success-bg); color: var(--success); }
.activity-score.partial { background: var(--amber-bg); color: var(--amber); }
.activity-score .score-num {
  font-size: var(--text-xl);
  font-weight: 700;
  font-family: var(--font-serif);
}

/* ── Level navigation ─────────────────────────────────────── */
.level-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-xl) 0 var(--space-2xl);
  max-width: 680px;
  margin-top: var(--space-xl);
  gap: var(--space-md);
}
.level-nav-info {
  text-align: center;
  font-size: var(--text-sm);
  color: var(--mid-grey);
}
.level-nav-info strong { color: var(--navy); display: block; }

/* ── Page navigation (within a level) ──────────────────────── */
.page-progress {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
  padding-bottom: var(--space-md);
  border-bottom: 1px solid var(--divider);
}

  el.textContent = '';
  setTimeout(() => { el.textContent = msg; }, 50);
}

// ── Render level ─────────────────────────────────────────
// Each level defines a `pages` array of authored chunks, each with a
// short noun-phrase `label` (shown in the within-level progress indicator)
// and an `html` body. The activity is appended automatically as the
// final page using the level's activityTitle as its label.

function renderLevel(id) {
  const level = LEVELS[id];
  if (!level) return;
  currentLevel = id;
  currentPageIndex = 0;

  // Build authored content pages + activity as the final page
  const contentPages = (level.pages || []).map(p => ({
    type: 'content',
    label: p.label,
    html: p.html
  }));
  currentPages = [
    ...contentPages,
    { type: 'activity', label: level.activityTitle, level }
  ];

  // Update progress dots
  document.querySelectorAll('.progress-dot').forEach((dot, i) => {
    dot.classList.remove('active', 'completed');
    if (i + 1 === id) dot.classList.add('active');
    else if (i + 1 < id) dot.classList.add('completed');
    dot.setAttribute('aria-label', `Level ${i+1}${i+1 === id ? ': current' : i+1 < id ? ': completed' : ''}`);
  });

  // Update panel context
  $('panel-context').textContent = level.panelContext;

  // Build all pages up front, hidden except the first. This preserves
  // the activity's DOM and any in-progress answers when the user pages
  // back to content and forward again.
  const pagesHtml = currentPages.map((page, i) => {
    const hidden = i === 0 ? '' : 'hidden';
    if (page.type === 'activity') {
      const lvl = page.level;
      return `
        <div class="page-content" data-page-index="${i}" ${hidden}>
          <section class="activity-zone" aria-labelledby="activity-heading">
            <div class="activity-header">
              <div class="activity-icon" aria-hidden="true">${lvl.activityIcon}</div>
              <div>
                <h2 id="activity-heading" tabindex="-1">${lvl.activityTitle}</h2>
                <p>${lvl.activityDesc}</p>
              </div>
            </div>
            <div id="activity-content">${buildActivity(lvl)}</div>
          </section>
        </div>
      `;
    }
    return `
      <div class="page-content" data-page-index="${i}" ${hidden}>
        <div class="content-body">${page.html}</div>
      </div>
    `;
  }).join('');

  const container = $('level-container');
  container.innerHTML = `
    <div class="level-badge" aria-label="${level.badge}">${level.badge}</div>
    <h2 class="level-title" id="level-heading" tabindex="-1">${level.title}</h2>
    <p class="level-subtitle">${level.subtitle}</p>
    <img class="level-image" src="${level.image}" alt="${level.imageAlt}" width="1200" height="280" loading="lazy">

    <div class="page-progress" role="group" aria-label="Progress within this level">
      <div class="page-progress-dots" id="page-progress-dots" role="tablist">
        ${currentPages.map((p, i) => `<button class="page-dot" data-page="${i}" role="tab" aria-label="Jump to page ${i+1}: ${p.label}" type="button"></button>`).join('')}
      </div>
      <div class="page-progress-label">
        <span id="page-progress-position">1</span> of ${currentPages.length} · <span class="page-label-current" id="page-progress-label">…</span>
      </div>
    </div>

    <div id="pages-wrapper">${pagesHtml}</div>

    <nav class="page-nav" id="page-nav" aria-label="Navigate within this level">
      <button class="btn btn-outline" id="page-prev-btn">← Back</button>
      <div class="page-indicator" id="page-indicator" aria-live="polite"></div>
      <button class="btn btn-primary" id="page-next-btn">Next →</button>
    </nav>

    <nav class="level-nav" id="level-nav" aria-label="Navigate between levels" hidden>
      <button class="btn btn-outline" id="prev-btn" ${id === 1 ? 'disabled aria-disabled="true"' : ''}>
        ← Previous Level
      </button>
      <div class="level-nav-info">
        <strong>Level ${id} of 6</strong>
        ${id < 6 ? 'Continue when you\'re ready' : 'Final level — well done!'}
      </div>
      <button class="btn btn-primary" id="next-btn" ${id === 6 ? 'disabled aria-disabled="true"' : ''}>
        ${id === 6 ? 'Complete ✓' : 'Next Level →'}
      </button>
    </nav>
  `;

  // Bind level-to-level nav
  const prevBtn = $('prev-btn');
  const nextBtn = $('next-btn');
  if (prevBtn && !prevBtn.disabled) prevBtn.addEventListener('click', () => navigateTo(currentLevel - 1));
  if (nextBtn && !nextBtn.disabled) nextBtn.addEventListener('click', () => navigateTo(currentLevel + 1));

  // Bind page nav
  $('page-prev-btn').addEventListener('click', () => goToPage(currentPageIndex - 1));
  $('page-next-btn').addEventListener('click', () => goToPage(currentPageIndex + 1));

  // Bind clickable page progress dots — let students jump to any page
  document.querySelectorAll('.page-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      const idx = parseInt(dot.dataset.page, 10);
      goToPage(idx);
    });
  });

  // Init activity once now that its DOM exists
  initActivity(level);

  // Render first page state
  renderPage(true);

  // Focus the level title on level entry
  const heading = $('level-heading');
  if (heading) setTimeout(() => heading.focus(), 100);

  // Add tutor opener to chat
  appendTutorMessage(level.panelOpener);
}

function renderPage(isInitialEntry = false) {
  const total = currentPages.length;
  const isLast = currentPageIndex === total - 1;
  const currentPage = currentPages[currentPageIndex];

  // Show only the current page (and re-trigger fade animation on it)
  document.querySelectorAll('#pages-wrapper .page-content').forEach(el => {
    const idx = parseInt(el.dataset.pageIndex, 10);
    const show = idx === currentPageIndex;
    el.hidden = !show;
    if (show) {
      el.style.animation = 'none';
      // eslint-disable-next-line no-unused-expressions
      el.offsetHeight;
      el.style.animation = '';
    }
  });

  // Update within-level progress dots
  document.querySelectorAll('.page-dot').forEach((dot, i) => {
    dot.classList.remove('active', 'completed');
    if (i === currentPageIndex) dot.classList.add('active');
    else if (i < currentPageIndex) dot.classList.add('completed');
  });

  // Update progress label + page indicator
  $('page-progress-position').textContent = String(currentPageIndex + 1);
  $('page-progress-label').textContent = currentPage.label || '';
  $('page-indicator').textContent = `${currentPageIndex + 1} of ${total} · ${currentPage.label || ''}`;
  $('page-prev-btn').disabled = currentPageIndex === 0;

  // Hide page-nav on the last page (level-nav takes over instead)
  $('page-nav').hidden = isLast;
  if (!isLast) {
    const nextPage = currentPages[currentPageIndex + 1];
    $('page-next-btn').textContent = nextPage.type === 'activity'
      ? `Continue to activity →`
      : `Next: ${nextPage.label} →`;
  }

  // Show level-to-level nav only on the last (activity) page
  $('level-nav').hidden = !isLast;

  // Scroll main content to top of the new page (don't auto-focus headings —
  // it's jarring; the visible page change is enough orientation)
  document.querySelector('.main-content').scrollTop = 0;

  // Announce page change to screen readers
  if (!isInitialEntry) {
    announce(`Page ${currentPageIndex + 1} of ${total}: ${currentPage.label || ''}`);
  }
}

function goToPage(idx) {
  if (idx < 0 || idx >= currentPages.length) return;
  currentPageIndex = idx;
  renderPage();
}

function navigateTo(id) {
  if (id < 1 || id > 6) return;
  renderLevel(id);
}

// ── Activity builders ────────────────────────────────────

function buildActivity(level) {
  switch (level.activityType) {
    case 'classifier': return buildClassifier(level.activityData);
    case 'sort':       return buildSort(level.activityData);
    case 'argbuilder': return buildArgBuilder(level.activityData);
    case 'paths':      return buildPaths(level.activityData);
    case 'matcher':    return buildMatcher(level.activityData);
    case 'dialectic':  return buildDialectic(level.activityData);
    default: return '<p>Activity loading…</p>';
  }
}

// ── LEVEL 1: Classifier ──────────────────────────────────
function buildClassifier(data) {
  return `
    <div id="classifier-container">
      ${data.map((item, i) => `
        <div class="claim-card" id="claim-${i}">
          <blockquote>"${item.quote}"</blockquote>
          <cite>${item.source}</cite>
          <div class="claim-options" role="group" aria-label="Classify this claim">
            <button class="claim-option-btn" data-claim="${i}" data-choice="supports" aria-label="Supports emotional knowledge">✓ Supports emotional knowledge</button>
            <button class="claim-option-btn" data-claim="${i}" data-choice="obstructs" aria-label="Challenges emotional knowledge">✗ Challenges it</button>
            <button class="claim-option-btn" data-claim="${i}" data-choice="neutral" aria-label="Neither">— Neither</button>
          </div>
          <div class="claim-feedback" id="feedback-${i}" role="alert"></div>
        </div>
      `).join('')}
      <div id="classifier-score" class="feedback-panel" role="status"></div>
    </div>
  `;
}

// Friendly labels for classifier choices (used when telling the student
// what the correct answer was after they got one wrong).
const CLASSIFIER_CHOICE_LABELS = {
  supports: 'Supports emotional knowledge',
  obstructs: 'Challenges it',
  neutral: 'Neither'
};

function initClassifier(data) {
  activityState.classifier = { answers: {}, total: data.length };

  document.querySelectorAll('.claim-option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.claim);
      const choice = btn.dataset.choice;
      const item = data[idx];
      if (activityState.classifier.answers[idx] !== undefined) return; // already answered

      activityState.classifier.answers[idx] = choice;
      const correct = choice === item.answer;
      const correctLabel = CLASSIFIER_CHOICE_LABELS[item.answer] || item.answer;

      // Mark button
      btn.classList.add(correct ? 'selected-correct' : 'selected-wrong');

      // Build feedback text — the data's `explanation` is just the WHY;
      // we prepend a verdict that matches the student's actual answer.
      const verdict = correct
        ? '✓ Correct. '
        : `✗ Not quite — the answer is "${correctLabel}". `;
      const fb = $(`feedback-${idx}`);
      fb.textContent = verdict + item.explanation;
      fb.classList.add('show', correct ? 'correct' : 'wrong');

      // Disable all buttons for this claim
      document.querySelectorAll(`[data-claim="${idx}"]`).forEach(b => { b.disabled = true; });

      announce(verdict + item.explanation);

      // Check if all done
      if (Object.keys(activityState.classifier.answers).length === data.length) {
        const score = Object.entries(activityState.classifier.answers).filter(([i, a]) => a === data[i].answer).length;
        const scoreEl = $('classifier-score');
        scoreEl.innerHTML = `<h4>Activity complete: ${score}/${data.length} correct</h4><p>${score === data.length ? 'You\'re identifying the epistemological implications precisely — that\'s the skill your essay needs.' : 'Review the feedback on each claim. The key is identifying what assumption is embedded in the language.'}</p>`;
        scoreEl.classList.add('show', score >= data.length - 1 ? 'correct' : 'partial');
      }
    });
  });
}

// ── LEVEL 2: Zone Sort ───────────────────────────────────
function buildSort(data) {
  const cards = shuffle([...data.cards]);
  return `
    <p class="u-help-text">
      Click a card to select it, then click the zone where it belongs. Click a placed card to return it to the pool.
    </p>
    <div class="sort-pool" id="sort-pool" role="list" aria-label="Cards to sort">
      ${cards.map(c => `
        <button class="sort-card" id="sc-${c.id}" data-id="${c.id}" role="listitem" aria-label="${c.text}">
          ${c.text}
        </button>
      `).join('')}
    </div>
    <div class="sort-zones" role="group" aria-label="Sort zones">
      ${data.zones.map(z => `
        <div class="sort-zone" id="zone-${z.id}" data-zone="${z.id}" role="region" aria-label="${z.label}">
          <div class="sort-zone-label">${z.label}</div>
          <div class="zone-cards" id="zc-${z.id}"></div>
        </div>
      `).join('')}
    </div>
    <div class="u-action-row">
      <button class="btn btn-primary" id="sort-check">Check answers</button>
      <button class="btn btn-outline" id="sort-reset">Reset</button>
    </div>
    <div id="sort-feedback" class="feedback-panel" role="status"></div>
  `;
}

function initSort(data) {
  activityState.sort = { selected: null, placed: {} };

  function selectCard(id) {
    if (activityState.sort.selected === id) {
      activityState.sort.selected = null;
      document.querySelectorAll('.sort-card').forEach(c => c.classList.remove('card-selected'));
      return;
    }
    activityState.sort.selected = id;
    document.querySelectorAll('.sort-card').forEach(c => c.classList.remove('card-selected'));
    const el = document.getElementById(`sc-${id}`);
    if (el) el.classList.add('card-selected');
  }

  function placeCard(zoneId) {
    const id = activityState.sort.selected;
    if (!id) return;
    activityState.sort.selected = null;

    // Remove from current location
    const card = document.getElementById(`sc-${id}`);
    if (card) card.remove();

    // Create new card in zone
    const zoneCards = document.getElementById(`zc-${zoneId}`);
    const newCard = document.createElement('button');
    newCard.className = 'sort-card';
    newCard.id = `sc-${id}`;
    newCard.dataset.id = id;
    newCard.setAttribute('aria-label', `${data.cards.find(c=>c.id===id).text} (in zone ${zoneId})`);
    newCard.textContent = data.cards.find(c => c.id === id).text;
    newCard.addEventListener('click', () => {
      // Return to pool
      newCard.remove();
      delete activityState.sort.placed[id];
      const pool = $('sort-pool');
      newCard.classList.remove('card-selected');
      pool.appendChild(newCard);
      bindPoolCard(newCard);
    });
    zoneCards.appendChild(newCard);
    activityState.sort.placed[id] = zoneId;
    document.querySelectorAll('.sort-card').forEach(c => c.classList.remove('card-selected'));
  }

  function bindPoolCard(el) {
    el.addEventListener('click', () => {
      selectCard(el.dataset.id);
    });
  }

  // Bind pool cards
  document.querySelectorAll('#sort-pool .sort-card').forEach(bindPoolCard);

  // Bind zones
  data.zones.forEach(z => {
    const zone = document.getElementById(`zone-${z.id}`);
    zone.addEventListener('click', () => {
      if (activityState.sort.selected) placeCard(z.id);
    });
    zone.setAttribute('tabindex', '0');
    zone.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (activityState.sort.selected) placeCard(z.id);
      }
    });
  });

  // Check button
  $('sort-check').addEventListener('click', () => {
    let correct = 0;
    data.cards.forEach(c => {
      const placed = activityState.sort.placed[c.id];
      const el = document.getElementById(`sc-${c.id}`);
      if (el) {
        if (!placed) return;
        if (placed === c.correct) {
          el.classList.add('correct-placed'); correct++;
        } else {
          el.classList.add('wrong-placed');
        }
      }
    });
    const fb = $('sort-feedback');
    fb.innerHTML = `<h4>${correct}/${data.cards.length} correctly sorted</h4><p>${correct >= 6 ? 'Excellent — you\'re making the Hume/Nussbaum distinction precisely.' : 'Check the cards marked in red. The key distinction: Hume gives emotion a FUNCTIONAL role (motivating); Nussbaum gives it a COGNITIVE role (constituting knowledge).'}</p>`;
    fb.classList.add('show', correct >= 6 ? 'correct' : 'partial');
    announce(`${correct} of ${data.cards.length} correctly placed.`);
  });

  $('sort-reset').addEventListener('click', () => {
    activityState.sort = { selected: null, placed: {} };
    renderLevel(currentLevel);
  });
}

// ── LEVEL 3: Argument Builder ────────────────────────────
function buildArgBuilder(data) {
  const shuffled = shuffle([...data.cards]);
  return `
    <div class="u-grid-2">
      <div>
        <p class="u-section-label">Cards (click to select):</p>
        <div id="arg-pool" class="arg-cards-container">
          ${shuffled.map(c => `
            <div class="arg-card" id="argcard-${c.id}" data-id="${c.id}" tabindex="0" role="button" aria-label="${c.text}">
              <div class="arg-number" id="argnum-${c.id}">?</div>
              <div>${c.text}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div>
        <p class="u-section-label">Argument order (click a slot to place selected card):</p>
        <div id="arg-slots" class="arg-cards-container">
          ${Array.from({length: data.slots}, (_, i) => `
            <div class="arg-card arg-slot-empty" id="slot-${i+1}" data-slot="${i+1}" tabindex="0" role="button" aria-label="Position ${i+1}: empty">
              <div class="arg-number active">${i+1}</div>
              <div class="slot-label">Click to place selected card here…</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
    <div class="u-action-row-lg">
      <button class="btn btn-primary" id="arg-check">Check my order</button>
      <button class="btn btn-outline" id="arg-reset">Reset</button>
    </div>
    <div id="arg-feedback" class="feedback-panel" role="status"></div>
  `;
}

function initArgBuilder(data) {
  activityState.arg = { selected: null, placed: {} }; // placed: {slot -> cardId}

  function selectCard(id) {
    activityState.arg.selected = activityState.arg.selected === id ? null : id;
    document.querySelectorAll('.arg-card').forEach(c => c.classList.remove('arg-selected'));
    if (activityState.arg.selected) {
      document.getElementById(`argcard-${activityState.arg.selected}`)?.classList.add('arg-selected');
    }
  }

  function placeInSlot(slot) {
    const id = activityState.arg.selected;
    if (!id) return;

    // Remove any existing card in this slot
    const existing = Object.entries(activityState.arg.placed).find(([, v]) => v === id);
    if (existing) { delete activityState.arg.placed[existing[0]]; }

    activityState.arg.placed[slot] = id;
    activityState.arg.selected = null;

    // Update all slot displays
    for (let s = 1; s <= data.slots; s++) {
      const slotEl = document.getElementById(`slot-${s}`);
      const cardId = activityState.arg.placed[s];
      const num = slotEl.querySelector('.arg-number');
      num.className = 'arg-number active';
      const labelEl = slotEl.querySelector('.slot-label');
      if (cardId) {
        const card = data.cards.find(c => c.id === cardId);
        labelEl.textContent = card.text;
        slotEl.classList.remove('arg-slot-empty');
        slotEl.classList.add('arg-slot-filled');
        slotEl.setAttribute('aria-label', `Position ${s}: ${card.text}`);
      } else {
        labelEl.textContent = 'Click to place selected card here…';
        slotEl.classList.remove('arg-slot-filled');
        slotEl.classList.add('arg-slot-empty');
        slotEl.setAttribute('aria-label', `Position ${s}: empty`);
      }
    }

    // Update pool card numbers
    data.cards.forEach(c => {
      const placed = Object.entries(activityState.arg.placed).find(([, v]) => v === c.id);
      const num = document.getElementById(`argnum-${c.id}`);
      if (num) { num.textContent = placed ? placed[0] : '?'; }
    });

    document.querySelectorAll('.arg-card').forEach(c => c.classList.remove('arg-selected'));
  }

  document.querySelectorAll('#arg-pool .arg-card').forEach(el => {
    el.addEventListener('click', () => selectCard(el.dataset.id));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectCard(el.dataset.id); }});
  });

  document.querySelectorAll('#arg-slots .arg-card').forEach(el => {
    el.addEventListener('click', () => placeInSlot(parseInt(el.dataset.slot)));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); placeInSlot(parseInt(el.dataset.slot)); }});
  });

  $('arg-check').addEventListener('click', () => {
    let correct = 0;
    for (let s = 1; s <= data.slots; s++) {
      const placed = activityState.arg.placed[s];
      const expected = data.cards.find(c => c.correctSlot === s);
      const slotEl = document.getElementById(`slot-${s}`);
      slotEl.classList.remove('arg-correct', 'arg-wrong');
      if (placed && expected && placed === expected.id) {
        slotEl.classList.add('arg-correct'); correct++;
      } else if (placed) {
        slotEl.classList.add('arg-wrong');
      }
    }
    const fb = $('arg-feedback');
    const hint = correct < data.slots ? 'Hint: start with the foundational claim about what emotions ARE, then work toward the conclusion about knowledge.' : '';
    fb.innerHTML = `<h4>${correct}/${data.slots} steps in the correct position</h4><p>${correct === data.slots ? 'You\'ve reconstructed Nussbaum\'s argument correctly. This is the argument structure you need for Prompt 2.' : hint}</p>`;
    fb.classList.add('show', correct >= 5 ? 'correct' : 'partial');
    announce(`${correct} of ${data.slots} steps correctly placed.`);
  });

  $('arg-reset').addEventListener('click', () => renderLevel(currentLevel));
}

// ── LEVEL 4: Two-Path Scenario ───────────────────────────
function buildPaths(data) {
  return `
    <div class="callout u-mb-md">
      <p class="callout-label">Scenario</p>
      <p>${data.scenario}</p>
    </div>
    <div class="path-grid">
      ${data.paths.map(path => `
        <div class="path-card ${path.id}">
          <div class="path-card-header">${path.label}</div>
          <div class="path-card-body">
            <p>${path.description}</p>
            ${path.questions.map(q => `
              <div class="path-question" id="pq-${q.id}">
                <p>${q.text}</p>
                <div class="path-radio-group" role="group" aria-label="${q.text}">
                  ${q.options.map((opt, i) => `
                    <label class="path-radio-label" id="prl-${q.id}-${i}">
                      <input type="checkbox" name="${q.id}" value="${i}" data-qid="${q.id}" data-correct="${opt.correct}" data-idx="${i}">
                      ${opt.text}
                    </label>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    <button class="btn btn-primary u-mt-md" id="path-check">Check my selections</button>
    <div class="path-question u-mt-md">
      <p class="u-bold">${data.synthesis}</p>
      <textarea class="synthesis-textarea u-mt-sm" id="path-synthesis" placeholder="Write 2–3 sentences using Nussbaum's terminology…" rows="4"></textarea>
      <p class="word-count" id="path-wc">0 words</p>
    </div>
    <div id="path-feedback" class="feedback-panel" role="status"></div>
  `;
}

function initPaths(data) {
  $('path-synthesis').addEventListener('input', function() {
    const wc = this.value.trim().split(/\s+/).filter(w => w).length;
    $('path-wc').textContent = wc + ' words';
  });

  $('path-check').addEventListener('click', () => {
    let correct = 0, total = 0;
    data.paths.forEach(path => {
      path.questions.forEach(q => {
        q.options.forEach((opt, i) => {
          total++;
          const cb = document.querySelector(`[data-qid="${q.id}"][data-idx="${i}"]`);
          const label = document.getElementById(`prl-${q.id}-${i}`);
          label.classList.remove('path-correct', 'path-wrong');
          if (cb.checked && opt.correct) { label.classList.add('path-correct'); correct++; }
          else if (cb.checked && !opt.correct) { label.classList.add('path-wrong'); }
          else if (!cb.checked && opt.correct) { label.classList.add('path-correct'); } // show correct anyway
        });
      });
    });
    const fb = $('path-feedback');
    fb.innerHTML = `<h4>Results revealed</h4><p>Observer A had factual, propositional knowledge about causes. Observer B had perceptual-emotional knowledge about particular human value. Nussbaum's claim is that B's knowledge is real knowledge — and that A was <em>blind</em> to features B could perceive. Neither path is complete; the philosophical question is whether B's knowledge is genuinely epistemic or merely empathetic.</p>`;
    fb.classList.add('show', 'correct');
    announce('Results shown. Review the highlighted answers.');
  });
}

// ── LEVEL 5: Matcher ──────────────────────────────────────
function buildMatcher(data) {
  return `
    <div id="matcher-container">
      ${data.map(item => `
        <div class="matcher-item" id="mi-${item.id}">
          <div class="matcher-claim">${item.claim}</div>
          <div class="matcher-options" role="group" aria-label="Who holds this claim?">
            ${item.options.map(opt => `
              <button class="matcher-btn" data-item="${item.id}" data-opt="${opt}" aria-label="${opt}">
                ${opt}
              </button>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    <div class="u-action-row-lg">
      <button class="btn btn-primary" id="matcher-check">Check answers</button>
      <button class="btn btn-outline" id="matcher-reset">Reset</button>
    </div>
    <div id="matcher-feedback" class="feedback-panel" role="status"></div>
  `;
}

function initMatcher(data) {
  activityState.matcher = {};

  document.querySelectorAll('.matcher-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const itemId = btn.dataset.item;
      const opt = btn.dataset.opt;
      // Deselect others in same group
      document.querySelectorAll(`[data-item="${itemId}"]`).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      activityState.matcher[itemId] = opt;
    });
    btn.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
    });
  });

  $('matcher-check').addEventListener('click', () => {
    let correct = 0;
    data.forEach(item => {
      const chosen = activityState.matcher[item.id];
      document.querySelectorAll(`[data-item="${item.id}"]`).forEach(b => {
        b.classList.remove('correct-final', 'wrong-final');
        if (b.dataset.opt === item.answer) b.classList.add('correct-final');
        else if (b.dataset.opt === chosen && chosen !== item.answer) b.classList.add('wrong-final');
      });
      if (chosen === item.answer) correct++;
    });
    const fb = $('matcher-feedback');
    fb.innerHTML = `<h4>${correct}/${data.length} correctly matched</h4><p>${correct >= 7 ? 'You\'re making the Haidt/Nussbaum distinction precisely — this is crucial for any essay that uses both thinkers.' : 'Focus on the distinction between Haidt\'s EMPIRICAL findings about how intuitions work, and Nussbaum\'s PHILOSOPHICAL argument about what makes emotional responses reliable knowledge.'}</p>`;
    fb.classList.add('show', correct >= 6 ? 'correct' : 'partial');
    announce(`${correct} of ${data.length} correctly matched.`);
  });

  $('matcher-reset').addEventListener('click', () => renderLevel(currentLevel));
}

// ── LEVEL 6: Dialectic ───────────────────────────────────
function buildDialectic(data) {
  return `
    <div class="u-mb-lg">
      <h3 class="dialectic-heading">Part A — Select Nussbaum's strongest reply</h3>
      <div class="reply-options" role="group" aria-label="Select a reply">
        ${data.replies.map(r => `
          <button class="reply-option" id="reply-${r.id}" data-id="${r.id}" aria-pressed="false">
            <div class="reply-label">${r.label}</div>
            <div>${r.text}</div>
          </button>
        `).join('')}
      </div>
      <button class="btn btn-primary u-mb-md" id="reply-check">Reveal analysis</button>
      <div id="reply-feedback" class="feedback-panel" role="status"></div>
    </div>

    <div class="synthesis-area">
      <h3>Part B — Write a dialectical synthesis paragraph</h3>
      <p>${data.synthesisPrompt}</p>
      <textarea class="synthesis-textarea" id="synthesis-text" placeholder="Nussbaum argues that… Plato objects that… However, Nussbaum can reply that… Therefore…" rows="6" aria-label="Synthesis paragraph"></textarea>
      <p class="word-count" id="synth-wc">0 words</p>
      <button class="btn btn-amber u-mt-sm" id="synth-submit" disabled>
        Submit to Socratic Tutor
      </button>
    </div>
  `;
}

function initDialectic(data) {
  activityState.dialectic = { selected: null };

  document.querySelectorAll('.reply-option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.reply-option').forEach(b => {
        b.classList.remove('reply-selected');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('reply-selected');
      btn.setAttribute('aria-pressed', 'true');
      activityState.dialectic.selected = btn.dataset.id;
    });
    btn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }});
  });

  $('reply-check').addEventListener('click', () => {
    const selected = activityState.dialectic.selected;
    if (!selected) { announce('Please select a reply first.'); return; }
    data.replies.forEach(r => {
      const el = document.getElementById(`reply-${r.id}`);
      el.classList.remove('reply-selected');
      if (r.quality === 'best') el.classList.add('reply-best');
      else el.classList.add('reply-not-best');
    });
    const sel = data.replies.find(r => r.id === selected);
    const fb = $('reply-feedback');
    fb.innerHTML = `<h4>You chose: ${sel.label}</h4><p>${sel.explanation}</p>`;
    fb.classList.add('show', sel.quality === 'best' ? 'correct' : 'partial');
    announce(sel.quality === 'best' ? 'Correct — that is the strongest reply.' : 'Not the strongest. ' + sel.explanation);
  });

  const synthText = $('synthesis-text');
  const synthWc = $('synth-wc');
  const synthSubmit = $('synth-submit');

  synthText.addEventListener('input', () => {
    const words = synthText.value.trim().split(/\s+/).filter(w => w).length;
    synthWc.textContent = words + ' words';
    synthWc.className = 'word-count' + (words >= 100 && words <= 180 ? ' target' : '');
    synthSubmit.disabled = words < 50;
  });

  synthSubmit.addEventListener('click', () => {
    const text = synthText.value.trim();
    const textarea = $('chat-textarea');
    if (textarea) {
      textarea.value = `I\'ve written this dialectical paragraph — can you give me feedback on whether the argument structure is correct?\n\n"${text}"`;
      textarea.dispatchEvent(new Event('input'));
    }
    $('chat-form').dispatchEvent(new Event('submit'));
    announce('Paragraph sent to your Socratic tutor for feedback.');
  });
}

// ── Init activity (after DOM build) ─────────────────────
function initActivity(level) {
  switch (level.activityType) {
    case 'classifier': initClassifier(level.activityData); break;
    case 'sort':       initSort(level.activityData); break;
    case 'argbuilder': initArgBuilder(level.activityData); break;
    case 'paths':      initPaths(level.activityData); break;
    case 'matcher':    initMatcher(level.activityData); break;
    case 'dialectic':  initDialectic(level.activityData); break;
  }
}

// ── Socratic chat ─────────────────────────────────────────
function renderPanel() {
  const msgs = $('chat-messages');
  if (!serverOnline) {
    // Show offline notice once
    if (!msgs.querySelector('.chat-offline-notice')) {
      const notice = document.createElement('div');
      notice.className = 'chat-offline-notice';
      notice.innerHTML = '<strong>Tutor offline</strong><br>The Socratic backend isn\'t reachable. If running locally, start with <code>npm start</code>. If deployed, check that <code>ANTHROPIC_API_KEY</code> is set in environment variables and the function deployed.';
      msgs.prepend(notice);
    }
  }
}

function appendTutorMessage(text) {
  const msgs = $('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg tutor';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendStudentMessage(text) {
  const msgs = $('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg student';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendThinking() {
  const msgs = $('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg thinking';
  div.id = 'thinking-indicator';
  div.innerHTML = '<span class="typing-indicator"><span>●</span><span>●</span><span>●</span></span>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendMessage(text) {
  if (!serverOnline) {
    appendTutorMessage('The Socratic tutor is offline. Run `npm start` in this folder to enable it.');
    return;
  }

  appendStudentMessage(text);
  chatHistory.push({ role: 'user', content: text });

  const thinking = appendThinking();
  $('chat-send').disabled = true;

  let fullText = '';
  const msgs = $('chat-messages');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, level: currentLevel, history: chatHistory.slice(-8) })
    });

    if (!res.ok) throw new Error('Server error');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let responseDiv = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n');

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          if (json.error) { appendTutorMessage('Error: ' + json.error); break; }
          if (json.text) {
            fullText += json.text;
            if (!responseDiv) {
              thinking.remove();
              responseDiv = document.createElement('div');
              responseDiv.className = 'chat-msg tutor';
              msgs.appendChild(responseDiv);
            }
            responseDiv.textContent = fullText;
            msgs.scrollTop = msgs.scrollHeight;
          }
        } catch { /* non-JSON line */ }
      }
    }

    if (fullText) chatHistory.push({ role: 'assistant', content: fullText });

  } catch (err) {
    thinking.remove();
    appendTutorMessage('Connection error — is the server running? Try `npm start`.');
    serverOnline = false;
  } finally {
    $('chat-send').disabled = false;
    $('chat-textarea').focus();
  }
}

// Toggle panel-context expand/collapse on click or Enter/Space
(function bindContextToggle() {
  const ctx = $('panel-context');
  const toggle = () => ctx.classList.toggle('expanded');
  ctx.addEventListener('click', toggle);
  ctx.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
  });
})();

// Chat form submit
$('chat-form').addEventListener('submit', async e => {
  e.preventDefault();
  const ta = $('chat-textarea');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = '';
  await sendMessage(text);
});

// Enter to send (Shift+Enter for newline)
$('chat-textarea').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    $('chat-form').dispatchEvent(new Event('submit'));
  }
});

// ── Utility ────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Boot ──────────────────────────────────────────────────
(async function boot() {
  await checkServer();
  renderLevel(1);
})();
</script>
